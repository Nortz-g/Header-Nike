<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Nike</title>
    <link rel="stylesheet" href="./css/style.css">

</head>

<body>
    <header>
        <div class="header-top">
            <a href="#" class="imagens-logo">
                <img src="./img/jordan logo.svg" alt="Jordan Logo">
                <img src="./img/snkrs logo.svg" alt="Sneakers Logo">
            </a>
            <ul class="menu-top">
                <li class="item-menu">Acessibilidade</li>
                <hr class="barra">
                <li class="item-menu">Guia de produtos</li>
                <hr class="barra">
                <li class="item-menu">Acompanhe seu pedido</li>
                <hr class="barra">
                <li class="item-menu">Ajuda</li>
                <hr class="barra">
                <li class="item-menu">Junte-se a nós</li>
                <hr class="barra">
                <li class="item-menu">Entrar</li>
            </ul>
        </div>

        <div class="header-mid">
            <a href="#" class="nike-logo">
                <img src="./img/swoosh nike logo.svg" alt="Nike Logo">
            </a>
            <ul class="menu-mid">
                <li class="item-mid">Seleções</li>
                <li class="item-mid">Ofertas</li>
                <li class="item-mid">Lançamentos</li>
                <li class="item-mid">Masculino</li>
                <li class="item-mid">Feminino</li>
                <li class="item-mid">Infantil</li>
                <li class="item-mid">SNKRS</li>
            </ul>



        </div>




    </header>
</body>

</html>
