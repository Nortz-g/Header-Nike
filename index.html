<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Nike</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>
    <header>
        <div class="header-top">
            <a href="#" class="imagens-logo">
                <img src="./img/jordan logo.svg" alt="Jordan Logo">
                <img src="./img/snkrs logo.svg" alt="Sneakers Logo">
            </a>
            <ul class="menu-top">
                <li class="item-menu">Acessibilidade</li>
                <hr class="barra">
                <li class="item-menu">Guia de produtos</li>
                <hr class="barra">
                <li class="item-menu">Acompanhe seu pedido</li>
                <hr class="barra">
                <li class="item-menu">Ajuda</li>
                <hr class="barra">
                <li class="item-menu">Junte-se a nós</li>
                <hr class="barra">
                <li class="item-menu">Entrar</li>
            </ul>
        </div>

        <div class="header-mid">
            <a href="#" class="nike-logo">
                <img src="./img/swoosh nike logo.svg" alt="Nike Logo">
            </a>
            <ul class="menu-mid">
                <li class="item-menu-mid">Seleções</li>
                <li class="item-menu-mid">Ofertas</li>
                <li class="item-menu-mid">Lançamentos</li>
                <li class="item-menu-mid">Masculino</li>
                <li class="item-menu-mid">Feminino</li>
                <li class="item-menu-mid">Infantil</li>
                <li class="item-menu-mid">SNKRS</li>
            </ul>

            <ul class="icons">
                <li class="icon-mid"><i class="fa-solid fa-magnifying-glass"></i></li>
                <li class="icon-mid"><i class="fa-regular fa-heart"></i></li>
                <li class="icon-mid"><i class="fa-solid fa-bag-shopping"></i></li>
            </ul>
        </div>

        <div class="header-bottom">
            <ul class="menu-bottom">
                <li class="seta-esquerda"><i class="fa-solid fa-angle-left"></i></li>
                <li class="icon-bottom"><i class="fa-solid fa-gift"></i></li>
                <li class="item-menu-bottom1">CARTÃO PRESENTE</li>
                <li class="item-menu-bottom2">para presentes de última hora.</li>
                <li class="item-menu-bottom3">Saiba Mais</li>
                <li class="seta-direita"><i class="fa-solid fa-angle-right"></i></li>
            </ul>
        </div>



    </header>
</body>

</html>
